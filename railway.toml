[build]
# Dockerfile lives in java-backend/; build context is java-backend/ so
# COPY pom.xml and COPY src/ resolve correctly inside Docker.
dockerfilePath = "java-backend/Dockerfile"
buildContext = "java-backend"

[deploy]
startCommand = ""
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# ── Environment variables ────────────────────────────────────────────────────
# These are used when you attach Railway's own Postgres plugin.
# If you are using AWS RDS instead, override these in the Railway dashboard:
#   SPRING_DATASOURCE_URL  = jdbc:postgresql://<rds-host>:5432/postgres
#   SPRING_DATASOURCE_USERNAME = Greenx_db
#   SPRING_DATASOURCE_PASSWORD = <your-password>
#
# Railway Postgres plugin references (active when a Postgres service is linked):
[variables]
SPRING_DATASOURCE_URL = "jdbc:postgresql://${{Postgres.PGHOST}}:${{Postgres.PGPORT}}/${{Postgres.PGDATABASE}}"
SPRING_DATASOURCE_USERNAME = "${{Postgres.PGUSER}}"
SPRING_DATASOURCE_PASSWORD = "${{Postgres.PGPASSWORD}}"
JWT_SECRET = "change-this-to-a-long-random-secret-before-going-live"
ALLOWED_ORIGINS = "https://greenx-1.onrender.com,https://greenx.vercel.app,https://mygreenx.vercel.app,https://web-hug-studio-46-043df96f-70335c46-main.vercel.app"
