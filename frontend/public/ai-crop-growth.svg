<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="Crop growth tracking">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0c4a6e"/>
      <stop offset="100%" stop-color="#155e75"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>
  
  <!-- Growing wheat/crop stalks -->
  <g fill="#67e8f9" opacity="0.3">
    <path d="M180 620 L180 480 M175 500 L180 480 L185 500 M170 520 L180 500 L190 520 M165 540 L180 520 L195 540"/>
    <path d="M280 620 L280 440 M275 460 L280 440 L285 460 M270 480 L280 460 L290 480 M265 500 L280 480 L295 500"/>
    <path d="M540 620 L540 420 M535 440 L540 420 L545 440 M530 460 L540 440 L550 460 M525 480 L540 460 L555 480"/>
    <path d="M890 620 L890 400 M885 420 L890 400 L895 420 M880 440 L890 420 L900 440 M875 460 L890 440 L905 460"/>
    <path d="M1050 620 L1050 380 M1045 400 L1050 380 L1055 400 M1040 420 L1050 400 L1060 420 M1035 440 L1050 420 L1065 440"/>
  </g>
  
  <!-- Growth trend curves -->
  <g stroke="#67e8f9" stroke-width="3" stroke-opacity="0.65">
    <path d="M140 560 C280 500, 360 420, 500 370 C630 325, 730 300, 860 240 C940 200, 1020 180, 1080 150" fill="none"/>
    <path d="M140 600 C300 560, 450 530, 600 490 C760 445, 900 410, 1060 360" fill="none"/>
  </g>
  
  <!-- Growth stage markers -->
  <g fill="#cffafe">
    <circle cx="500" cy="370" r="10"/>
    <circle cx="860" cy="240" r="10"/>
    <circle cx="1080" cy="150" r="10"/>
  </g>
  
  <!-- Leaf icons -->
  <g fill="#22d3ee" opacity="0.4">
    <ellipse cx="500" cy="340" rx="30" ry="15" transform="rotate(-30 500 340)"/>
    <ellipse cx="860" cy="210" rx="30" ry="15" transform="rotate(-30 860 210)"/>
    <ellipse cx="1080" cy="120" rx="30" ry="15" transform="rotate(-30 1080 120)"/>
  </g>
  
  <g fill="#ecfeff" font-family="Arial, sans-serif" font-weight="700">
    <text x="80" y="95" font-size="44">CROP GROWTH TRACKING</text>
    <text x="80" y="142" font-size="24" fill="#a5f3fc">Season curves, health scores, and trend analysis</text>
  </g>
  
  <g fill="#22d3ee" fill-opacity="0.22">
    <rect x="140" y="210" width="220" height="120" rx="14"/>
    <rect x="400" y="210" width="220" height="120" rx="14"/>
    <rect x="660" y="210" width="220" height="120" rx="14"/>
  </g>
</svg>