<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="Profit prediction">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#581c87"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>
  
  <!-- Wheat/grain stalks representing harvest -->
  <g fill="#c4b5fd" opacity="0.3">
    <g transform="translate(900, 180)">
      <path d="M0 0 L0 -40 M-3 -25 L0 -40 L3 -25 M-6 -15 L0 -30 L6 -15 M-9 -5 L0 -20 L9 -5"/>
      <circle cx="-9" cy="-5" r="3"/>
      <circle cx="9" cy="-5" r="3"/>
      <circle cx="-6" cy="-15" r="3"/>
      <circle cx="6" cy="-15" r="3"/>
    </g>
    <g transform="translate(1040, 140)">
      <path d="M0 0 L0 -50 M-3 -32 L0 -50 L3 -32 M-6 -20 L0 -40 L6 -20 M-9 -8 L0 -28 L9 -8"/>
      <circle cx="-9" cy="-8" r="3"/>
      <circle cx="9" cy="-8" r="3"/>
      <circle cx="-6" cy="-20" r="3"/>
      <circle cx="6" cy="-20" r="3"/>
    </g>
  </g>
  
  <!-- Upward profit trend line -->
  <g stroke="#c4b5fd" stroke-width="5" fill="none" stroke-linecap="round">
    <path d="M120 540 L300 500 L460 460 L620 390 L780 340 L940 250 L1080 170"/>
  </g>
  
  <!-- Revenue markers -->
  <g fill="#ddd6fe">
    <circle cx="300" cy="500" r="10"/>
    <circle cx="620" cy="390" r="10"/>
    <circle cx="940" cy="250" r="10"/>
    <circle cx="1080" cy="170" r="12"/>
  </g>
  
  <!-- Coins/currency symbols -->
  <g fill="#a78bfa" opacity="0.4">
    <circle cx="300" cy="470" r="15"/>
    <circle cx="620" cy="360" r="15"/>
    <circle cx="940" cy="220" r="15"/>
  </g>
  
  <g fill="#f5f3ff" font-family="Arial, sans-serif" font-weight="700">
    <text x="80" y="95" font-size="44">PROFIT FORECAST</text>
    <text x="80" y="142" font-size="24" fill="#ddd6fe">Revenue predictions with risk-adjusted planning</text>
  </g>
  
  <g fill="#a78bfa" fill-opacity="0.25">
    <rect x="130" y="210" width="210" height="110" rx="16"/>
    <rect x="390" y="210" width="210" height="110" rx="16"/>
    <rect x="650" y="210" width="210" height="110" rx="16"/>
    <rect x="910" y="210" width="210" height="110" rx="16"/>
  </g>
</svg>