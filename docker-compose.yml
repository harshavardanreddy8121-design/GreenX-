version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: farm-app-postgres
    environment:
      POSTGRES_DB: greenx
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - farm-network

  # Java Backend
  backend:
    build:
      context: ./java-backend
      dockerfile: Dockerfile
    container_name: farm-app-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/greenx
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: your-secret-key-change-this-in-production-at-least-32-characters-long!
      JWT_EXPIRATION: 86400000
    ports:
      - "8080:8080"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - farm-network
    restart: unless-stopped

  # Frontend (optional - for development only)
  frontend:
    image: node:18-alpine
    container_name: farm-app-frontend
    working_dir: /app
    volumes:
      - ./:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://backend:8080
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend
    networks:
      - farm-network

volumes:
  postgres_data:

networks:
  farm-network:
    driver: bridge
