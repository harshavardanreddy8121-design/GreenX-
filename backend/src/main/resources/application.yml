spring:
  application:
    name: farm-management-api
    # DB connection is configured via environment variables:
    #   SPRING_DATASOURCE_URL      e.g. jdbc:postgresql://host:5432/dbname
    #   SPRING_DATASOURCE_USERNAME
    #   SPRING_DATASOURCE_PASSWORD
  
  # PostgreSQL Database Configuration
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:greenx}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USER:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:postgres}}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Railway Postgres free tier allows max 20 connections total across all apps.
      # Keep pool small to stay within limits.
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
  
  # JPA/Hibernate Configuration
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
          fetch_size: 50
        order_inserts: true
        order_updates: true
  
  # Jackson Configuration
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
      indent-output: true

  # File Upload configuration
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

# Logging Configuration
logging:
  level:
    root: INFO
    com.greenx: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# Server Configuration
# Railway injects PORT automatically; default 8001 matches Emergent's expected port
server.port: ${PORT:8001}
server.servlet.context-path: /api

# JWT Configuration
# Set JWT_SECRET env var in Railway/Render to a strong random string
jwt:
  secret: ${JWT_SECRET:your-secret-key-change-this-in-production-with-at-least-32-characters-minimum}
  expiration: ${JWT_EXPIRATION:86400000} # 24 hours default

# CORS Configuration
cors:
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}

# File upload directory
app:
  upload:
    dir: ${UPLOAD_DIR:./uploads}

