name: Build and Deploy

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io

jobs:
  # Frontend Tests and Build
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint
        run: npm run lint
      
      - name: Build
        run: npm run build
      
      - name: Upload frontend artifact
        uses: actions/upload-artifact@v3
        with:
          name: dist
          path: dist/

  # Backend Tests and Build
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java-backend
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'openjdk'
          cache: maven
      
      - name: Build with Maven
        run: mvn clean package
      
      - name: Upload backend artifact
        uses: actions/upload-artifact@v3
        with:
          name: java-backend-jar
          path: java-backend/target/farm-management-api-*.jar

  # Build Docker Image
  docker:
    needs: backend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Download backend artifact
        uses: actions/download-artifact@v3
        with:
          name: java-backend-jar
          path: java-backend/target/
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: java-backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/farm-api:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/farm-api:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/farm-api:buildcache,mode=max
