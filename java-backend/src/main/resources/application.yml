spring:
  application:
    name: farm-management-api
    # DB connection is configured via environment variables:
    #   SPRING_DATASOURCE_URL      e.g. jdbc:postgresql://host:5432/dbname
    #   SPRING_DATASOURCE_USERNAME
    #   SPRING_DATASOURCE_PASSWORD
  
  # PostgreSQL Database Configuration
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/greenx}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
  
  # JPA/Hibernate Configuration
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
          fetch_size: 50
        order_inserts: true
        order_updates: true
  
  # Jackson Configuration
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
      indent-output: true

  # File Upload configuration
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

# Logging Configuration
logging:
  level:
    root: INFO
    com.greenx: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# Server Configuration
server:
  port: 8082
  servlet:
    context-path: /api

# JWT Configuration
jwt:
  secret: your-secret-key-change-this-in-production-at-least-32-characters-long!
  expiration: 86400000 # 24 hours in milliseconds

# File upload directory
app:
  upload:
    dir: ${UPLOAD_DIR:./uploads}

