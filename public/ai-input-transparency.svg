<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="Input usage transparency">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#78350f"/>
      <stop offset="100%" stop-color="#9a3412"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>
  
  <!-- Fertilizer bag icon -->
  <g fill="#fbbf24" opacity="0.3">
    <rect x="165" y="120" width="60" height="80" rx="5"/>
    <path d="M175 120 Q195 110 215 120"/>
  </g>
  
  <!-- Water drop icons -->
  <g fill="#06b6d4" opacity="0.35">
    <path d="M515 180 Q515 165 525 155 Q535 165 535 180 Q535 195 525 200 Q515 195 515 180"/>
    <path d="M475 200 Q475 188 483 180 Q491 188 491 200 Q491 212 483 216 Q475 212 475 200"/>
  </g>
  
  <!-- Tractor/tool icon -->
  <g fill="#f59e0b" opacity="0.3">
    <rect x="735" y="240" width="90" height="40" rx="8"/>
    <circle cx="755" cy="295" r="18"/>
    <circle cx="805" cy="295" r="18"/>
  </g>
  
  <!-- Usage bars -->
  <g fill="#fde68a" fill-opacity="0.24">
    <rect x="120" y="180" width="230" height="390" rx="20"/>
    <rect x="400" y="230" width="230" height="340" rx="20"/>
    <rect x="680" y="280" width="230" height="290" rx="20"/>
    <rect x="960" y="330" width="120" height="240" rx="20"/>
  </g>
  
  <g stroke="#fbbf24" stroke-width="4" stroke-opacity="0.65">
    <line x1="120" y1="600" x2="1080" y2="600"/>
    <line x1="120" y1="150" x2="1080" y2="150"/>
  </g>
  
  <g fill="#fef3c7" font-family="Arial, sans-serif" font-weight="700">
    <text x="80" y="95" font-size="44">INPUT TRANSPARENCY</text>
    <text x="80" y="142" font-size="24" fill="#fde68a">Every fertilizer, water, and labor unit is auditable</text>
  </g>
  
  <g fill="#fff7ed" font-family="Arial, sans-serif" font-size="22">
    <text x="150" y="560">FERTILIZER</text>
    <text x="430" y="560">WATER</text>
    <text x="730" y="560">LABOR</text>
    <text x="970" y="560">WASTE</text>
  </g>
</svg>